<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Surprise 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:   #e85d75;
      --purple: #9b3fca;
      --violet: #c94b94;
      --gold:   #f9c74f;
      --light:  #f5e6ff;
      --bg1:    #1a0533;
      --bg2:    #2d0a4e;
      --bg3:    #0d1b4b;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg1);
      color: #fff;
      overflow-x: hidden;
    }

    /* ── CANVAS ── */
    #stage {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem 1rem;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
    }

    /* ── STARS ── */
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.5); }
    }

    /* ── BALLOONS ── */
    .balloon {
      position: absolute;
      bottom: -20px;
      font-size: 36px;
      pointer-events: none;
      user-select: none;
      animation: floatUp ease-in-out infinite;
    }
    @keyframes floatUp {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-22px) rotate(4deg); }
    }

    /* ── CONFETTI ── */
    .conf {
      position: absolute;
      top: -20px;
      pointer-events: none;
      border-radius: 2px;
      animation: fallDown linear forwards;
    }
    @keyframes fallDown {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── SCREENS ── */
    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 10;
      animation: fadeUp 0.5s ease both;
    }
    .screen.hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAME SCREEN ── */
    #name-screen h2 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(26px, 6vw, 40px);
      background: linear-gradient(90deg, #ffcf73, #ff80c0, #b48eff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.3;
    }
    #name-screen p {
      color: rgba(255,255,255,0.65);
      font-size: 16px;
      text-align: center;
    }
    .bounce-emoji {
      font-size: 56px;
      display: block;
      animation: bounce 1.2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%      { transform: translateY(-14px); }
      60%      { transform: translateY(-7px); }
    }

    /* ── INPUT ── */
    #friend-name {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: #fff;
      text-align: center;
      outline: none;
      width: 280px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #friend-name::placeholder { color: rgba(255,255,255,0.3); }
    #friend-name:focus {
      border-color: #b48eff;
      box-shadow: 0 0 0 3px rgba(180,142,255,0.2);
    }
    #friend-name.error { border-color: var(--pink); animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 13px 30px;
      border-radius: 50px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover  { transform: scale(1.05); }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, #b48eff 0%, var(--pink) 100%);
      color: #fff;
      box-shadow: 0 6px 24px rgba(180,142,255,0.45);
      animation: glow 2.2s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 6px 24px rgba(180,142,255,0.45); }
      50%      { box-shadow: 0 6px 40px rgba(232,93,117,0.6); }
    }

    .btn-ghost {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.25);
      font-size: 14px;
      padding: 10px 20px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }

    /* ── CAKE ── */
    #cake-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay: 0.2s;
    }
    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); opacity: 1; }
    }

    .candle-row {
      display: flex;
      gap: 10px;
      margin-bottom: -3px;
      z-index: 2;
      position: relative;
    }
    .candle { display: flex; flex-direction: column; align-items: center; }
    .flame {
      width: 11px;
      height: 15px;
      background: radial-gradient(ellipse at 50% 75%, #ffe066 35%, #ff9900 75%, transparent 100%);
      border-radius: 50% 50% 30% 30%;
      animation: flameDance 0.6s ease-in-out infinite;
      transition: opacity 0.5s, transform 0.5s;
    }
    @keyframes flameDance {
      0%,100% { transform: scaleX(1)   skewX(0deg); }
      30%      { transform: scaleX(0.8) skewX(-10deg); }
      70%      { transform: scaleX(1.1) skewX(8deg); }
    }
    .flame.out { opacity: 0; transform: scale(0); }
    .candle-body {
      width: 9px;
      height: 30px;
      border-radius: 4px 4px 2px 2px;
    }

    .cake-tier {
      position: relative;
      border-radius: 10px 10px 6px 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tier1 { width: 170px; height: 46px; background: var(--pink); }
    .tier2 { width: 220px; height: 50px; background: var(--violet); margin-top: -2px; }
    .tier3 { width: 270px; height: 54px; background: var(--purple); margin-top: -2px; border-radius: 8px 8px 14px 14px; }

    .frosting {
      position: absolute;
      top: -8px;
      left: 0;
      width: 100%;
      height: 14px;
      overflow: hidden;
      pointer-events: none;
    }
    .drip {
      position: absolute;
      top: 0;
      background: rgba(255,255,255,0.88);
      border-radius: 0 0 6px 6px;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.65);
    }

    .cake-plate {
      width: 290px;
      height: 20px;
      background: var(--light);
      border-radius: 50%;
      margin-top: -4px;
      opacity: 0.5;
    }
    .cake-label {
      color: rgba(255,255,255,0.92);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* ── WISH TEXT ── */
    #wish-text {
      text-align: center;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.9s;
      max-width: 460px;
    }
    #wish-headline {
      font-family: 'Pacifico', cursive;
      font-size: clamp(22px, 5vw, 34px);
      background: linear-gradient(90deg, #ffcf73, #ff80c0, #b48eff, #7ed4ff, #ffcf73);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    @keyframes shimmer {
      from { background-position: 200% center; }
      to   { background-position: -200% center; }
    }
    #wish-body {
      color: rgba(255,255,255,0.78);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 1.4rem;
    }
  </style>
</head>
<body>
<div id="stage">
  <!-- Background stars -->
  <div id="stars"></div>
  <!-- Floating balloons -->
  <div id="balloons"></div>

  <!-- ── SCREEN 1: Name entry ── -->
  <div class="screen" id="name-screen">
    <span class="bounce-emoji">🎂</span>
    <h2>Birthday Surprise</h2>
    <p>Enter your friend's name to reveal their special wish!</p>
    <input id="friend-name" type="text" placeholder="Friend's name..." maxlength="24" />
    <button class="btn btn-primary" onclick="launch()">Reveal the Surprise ✨</button>
  </div>

  <!-- ── SCREEN 2: Surprise ── -->
  <div class="screen hidden" id="surprise-screen">
    <!-- Cake -->
    <div id="cake-wrap">
      <div class="candle-row" id="candles"></div>
      <div class="cake-tier tier1" id="tier1">
        <div class="frosting" id="drips1"></div>
      </div>
      <div class="cake-tier tier2" id="tier2">
        <div class="frosting" id="drips2"></div>
      </div>
      <div class="cake-tier tier3" id="tier3">
        <div class="frosting" id="drips3"></div>
        <span class="cake-label">Happy Birthday</span>
      </div>
      <div class="cake-plate"></div>
    </div>

    <!-- Wish message -->
    <div id="wish-text">
      <h1 id="wish-headline"></h1>
      <p id="wish-body"></p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="blowCandles()">🕯️ Blow the candles!</button>
        <button class="btn btn-ghost" onclick="moreConfetti()">🎊 More confetti!</button>
        <button class="btn btn-ghost" onclick="reset()">↩ Start over</button>
      </div>
    </div>
  </div>
</div>

<script>
  const MESSAGES = [
    "May all your dreams come true today! You deserve every bit of happiness the world has to offer. Here's to you!",
    "Another year of amazing adventures awaits! May this birthday bring you joy, laughter, and everything you've been wishing for.",
    "You make the world a brighter place — so glad you were born! Celebrate big today and always.",
    "Today is YOUR day — shine bright! May this birthday be the start of the best chapter yet.",
    "Wishing you the sweetest birthday ever! May every moment be filled with love, laughter, and pure happiness.",
    "Count your blessings, not your candles! May this year bring you the most beautiful moments and wonderful surprises."
  ];

  const CANDLE_COLORS = ['#ff6b9d','#c879ff','#48dbfb','#feca57','#ff9f43'];
  let candlesBlown = false;

  /* ── Stars ── */
  function buildStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 3 + 1;
      s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;opacity:${0.2+Math.random()*0.8}`;
      c.appendChild(s);
    }
  }

  /* ── Balloons ── */
  function buildBalloons() {
    const c = document.getElementById('balloons');
    c.innerHTML = '';
    ['🎈','🎈','🎉','🎈','🎊'].forEach((e, i) => {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.textContent = e;
      b.style.cssText = `left:${6+i*19}%;animation-duration:${2.4+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;font-size:${28+Math.random()*16}px`;
      c.appendChild(b);
    });
  }

  /* ── Confetti ── */
  function confetti(burst) {
    const stage = document.getElementById('stage');
    const colors = ['#ff6b9d','#feca57','#48dbfb','#c879ff','#ff9f43','#00d2ff','#ff4757','#7bed9f'];
    const count = burst ? 70 : 30;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'conf';
        c.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.random()*colors.length|0]};width:${7+Math.random()*8}px;height:${7+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.6}s`;
        stage.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, i * (burst ? 25 : 45));
    }
  }

  /* ── Candles ── */
  function buildCandles() {
    const row = document.getElementById('candles');
    row.innerHTML = '';
    candlesBlown = false;
    CANDLE_COLORS.forEach((col, i) => {
      const d = document.createElement('div');
      d.className = 'candle';
      d.innerHTML = `<div class="flame" id="flame${i}"></div><div class="candle-body" style="background:${col}"></div>`;
      row.appendChild(d);
    });
  }

  /* ── Frosting drips ── */
  function buildDrips(id, count, maxW) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const taken = [];
    for (let i = 0; i < count; i++) {
      let x;
      for (let t = 0; t < 30; t++) {
        x = Math.floor(Math.random() * (maxW - 14));
        if (!taken.some(p => Math.abs(p - x) < 12)) break;
      }
      taken.push(x);
      const h = 9 + Math.random() * 14;
      const w = 7 + Math.random() * 6;
      const d = document.createElement('div');
      d.className = 'drip';
      d.style.cssText = `left:${x}px;width:${w}px;height:${h}px`;
      el.appendChild(d);
    }
  }

  /* ── Dot decorations ── */
  function buildDots(tierId, count, tierW, tierH) {
    const tier = document.getElementById(tierId);
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const sz = 5 + Math.random() * 6;
      dot.style.cssText = `width:${sz}px;height:${sz}px;left:${10+Math.random()*(tierW-20)}px;top:${6+Math.random()*(tierH-14)}px`;
      tier.appendChild(dot);
    }
  }

  /* ── LAUNCH ── */
  function launch() {
    const input = document.getElementById('friend-name');
    const name = input.value.trim();
    if (!name) {
      input.classList.add('error');
      input.placeholder = 'Please enter a name!';
      setTimeout(() => { input.classList.remove('error'); input.placeholder = "Friend's name..."; }, 1400);
      return;
    }

    document.getElementById('name-screen').classList.add('hidden');
    const s = document.getElementById('surprise-screen');
    s.classList.remove('hidden');

    const msg = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
    document.getElementById('wish-headline').textContent = `Happy Birthday, ${name}! 🎉`;
    document.getElementById('wish-body').textContent = msg;

    buildCandles();
    buildDrips('drips1', 5, 170);
    buildDrips('drips2', 6, 220);
    buildDrips('drips3', 7, 270);
    buildDots('tier1', 3, 170, 46);
    buildDots('tier2', 4, 220, 50);
    buildBalloons();
    confetti(true);
  }

  /* ── BLOW CANDLES ── */
  function blowCandles() {
    if (candlesBlown) { buildCandles(); return; }
    CANDLE_COLORS.forEach((_, i) => {
      setTimeout(() => {
        const f = document.getElementById('flame' + i);
        if (f) f.classList.add('out');
      }, i * 200);
    });
    candlesBlown = true;
    setTimeout(() => confetti(true), 400);
  }

  /* ── MORE CONFETTI ── */
  function moreConfetti() { confetti(true); }

  /* ── RESET ── */
  function reset() {
    document.getElementById('surprise-screen').classList.add('hidden');
    const ns = document.getElementById('name-screen');
    ns.classList.remove('hidden');
    document.getElementById('friend-name').value = '';
    document.getElementById('balloons').innerHTML = '';
  }

  /* ── ENTER key support ── */
  document.getElementById('friend-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') launch();
  });

  /* ── INIT ── */
  buildStars();
</script>
</body>
</html>
